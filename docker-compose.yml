networks:
  dataops-network:
    driver: bridge

volumes:
  pg_data:
  mongo_data:
  qdrant_data:
  neo4j_data:
  seaweedfs_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: dataops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dataops-network

  mongo:
    image: mongo:7
    container_name: dataops-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dataops-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: dataops-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dataops-network

  neo4j:
    image: neo4j:5-community
    container_name: dataops-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dataops-network

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: dataops-seaweedfs
    command: server -s3 -dir=/data
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9333/cluster/status"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dataops-network

  seed-neo4j:
    image: neo4j:5-community
    container_name: dataops-seed-neo4j
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    volumes:
      - ./infra/scripts:/scripts:ro
    entrypoint: ["bash", "/scripts/seed-neo4j.sh"]
    restart: "no"
    networks:
      - dataops-network

  init-seaweedfs:
    image: amazon/aws-cli:latest
    container_name: dataops-init-seaweedfs
    depends_on:
      seaweedfs:
        condition: service_healthy
    volumes:
      - ./infra/scripts:/scripts:ro
      - ./infra/docs:/docs:ro
    entrypoint: ["sh", "/scripts/init-seaweedfs.sh"]
    restart: "no"
    networks:
      - dataops-network

  data-generator:
    build:
      context: ./generator
      dockerfile: Dockerfile
    container_name: dataops-data-generator
    env_file: .env
    environment:
      GENERATOR_INTERVAL_SECONDS: 30
      # .env's *_HOST values are meant for host-machine tools connecting via
      # exposed ports (localhost) — inside the compose network we must use
      # the service names instead.
      POSTGRES_HOST: postgres
      MONGO_HOST: mongo
      SEAWEEDFS_HOST: seaweedfs
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    networks:
      - dataops-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataops-app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Same reasoning as data-generator: .env's *_HOST values target the
      # host-exposed ports, but this container must reach services by name.
      POSTGRES_HOST: postgres
      MONGO_HOST: mongo
      QDRANT_HOST: qdrant
      NEO4J_URI: bolt://neo4j:7687
      SEAWEEDFS_HOST: seaweedfs
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    networks:
      - dataops-network
    restart: unless-stopped
